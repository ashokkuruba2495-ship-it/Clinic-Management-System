 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>

<div class="main">
    <h1>AR Hospital</h1>

    <div class="signup">
        <h2>Create Account</h2><br><br>

        <label>Full Name</label>
        <input type="text" id="fullname" placeholder="Enter your full name"><br><br>

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email"><br><br>

        <label>Mobile Number</label>
        <input type="tel" id="mobile" placeholder="Enter your mobile number"><br><br>

        <label>Gender</label>
        <select id="gender">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select><br><br>

        <label>Date of Birth</label>
        <input type="date" id="dob"><br><br>

        <label>Password</label>
        <input type="password" id="password" placeholder="Create password"><br><br>

        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password"><br><br>

        <button onclick="createAccount()">Create Account</button>

        <h4>Already have an account?
            <a href="login.html">
                <button type="button">Login</button>
            </a>
        </h4>
    </div>
</div>

<footer>
    <div class="section">
        <section class="contact">
            <h4>Contact Us:</h4>
            <p>Email: ✉️ support@arh.com</p>
            <p>Phone: 📞 +91 8328169359</p>
        </section>
        <section class="copy">
            <p>© 2026 AR Hospital. All Rights Reserved.</p>
        </section>
    </div>
</footer>


<script>
function createAccount() {

    var name = document.getElementById("fullname").value;
    var email = document.getElementById("email").value;
    var mobile = document.getElementById("mobile").value;
    var gender = document.getElementById("gender").value;
    var password = document.getElementById("password").value;
    var confirmPassword = document.getElementById("confirmPassword").value;

    if(name === "" || email === "" || mobile === "" || gender === "" || password === "" || confirmPassword === "") {
        alert("Please fill all fields!");
        return;
    }

    if(password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
    }

    alert("Account Created Successfully!");

    window.location.href = "home.html"; 
}
</script>

</body>
</html>
